# Crittercam defaults. User overrides live at <data_root>/config.yaml and are
# deep-merged over this file at startup.
data_root: ~/wildlife-camera-data

camera:
  kind: usb            # usb | file  (csi | rtsp reserved for later)
  device: /dev/video0  # V4L2 device for usb, video file path for file
  width: 1280
  height: 720
  fps: 30
  fourcc: MJPG         # Arducam over USB2 needs MJPG for full frame rate

detector:
  backend: cpu         # cpu | tensorrt (tensorrt lands in milestone 4)
  model: yolo11n.pt    # resolved under <data_root>/models/, auto-downloaded
  confidence: 0.45
  classes: []          # COCO class names to keep; empty = all (M1 bring-up)
  infer_every_n: 5     # CPU is ~1-3 FPS; publish every frame, infer every Nth

events:
  min_track_frames: 5
  linger_seconds: 5
  preroll_seconds: 10
  max_clip_seconds: 300

storage:
  disk_high_watermark: 0.85
  disk_low_watermark: 0.75

web:
  host: 0.0.0.0
  port: 8080
  live_fps: 10
  open_browser: false  # open the UI in a browser on the local display at startup

zmq_frame_endpoint: tcp://127.0.0.1:5555
log_level: INFO
